<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面談予約システム - 高校二者面談</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .slot-booked { 
            background-color: #fee2e2; 
            color: #991b1b; 
            cursor: not-allowed; 
            opacity: 0.5; 
            border-color: #fecaca;
        }
        .slot-available { 
            background-color: #f0fdf4; 
            color: #166534; 
            cursor: pointer; 
            transition: all 0.2s; 
            border-color: #bbf7d0;
        }
        .slot-available:hover { 
            background-color: #dcfce7; 
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .slot-selected { 
            background-color: #16a34a !important; 
            color: white !important; 
            ring: 3px solid #15803d;
            border-color: #15803d !important;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .loading-spinner { 
            border: 3px solid #f3f3f3; 
            border-top: 3px solid #3498db; 
            border-radius: 50%; 
            width: 24px; 
            height: 24px; 
            animation: spin 1s linear infinite; 
            display: inline-block; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading-overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(255,255,255,0.95); 
            z-index: 100; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column; 
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

<!-- 初期ローディング画面 -->
<div id="loading-overlay">
    <div id="loading-content" class="text-center">
        <div class="loading-spinner mb-4"></div>
        <p id="loading-text" class="text-sm font-bold text-slate-600">最新の空き状況を照会中...</p>
        <p class="text-[10px] text-slate-400 mt-2 italic">※一枠一人限定のため、重複を防いでいます</p>
    </div>
    <div id="error-content" class="hidden text-center p-6">
        <p class="text-red-500 font-bold mb-4">データの取得に失敗しました</p>
        <p class="text-xs text-slate-500 mb-6">GASのURLが正しいか、デプロイが「全員」に公開されているか確認してください。</p>
        <button onclick="location.reload()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg">再試行する</button>
    </div>
</div>

<div id="app" class="max-w-md mx-auto p-4 sm:p-6 pb-24">
    <div class="flex justify-end mb-4">
        <button id="btn-toggle-view" class="text-[10px] bg-slate-200 text-slate-600 px-3 py-1 rounded-full hover:bg-slate-300 shadow-sm transition-colors">
            管理者モード
        </button>
    </div>

    <div id="view-user">
        <header class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">春期 二者面談予約</h1>
            <p class="text-sm text-slate-500 mt-2">4/22(水) 〜 5/15(金)</p>
            <div class="mt-3 flex justify-center gap-4 text-[11px]">
                <span class="flex items-center"><span class="w-3 h-3 bg-green-100 border border-green-200 rounded-sm mr-1"></span> 予約可能</span>
                <span class="flex items-center"><span class="w-3 h-3 bg-red-100 border border-red-200 rounded-sm mr-1 opacity-50"></span> 予約済み</span>
            </div>
        </header>

        <!-- STEP 1 -->
        <section class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-slate-100">
            <h2 class="text-lg font-semibold mb-4 flex items-center text-slate-700">
                <span class="w-7 h-7 bg-blue-600 text-white rounded-full flex items-center justify-center mr-2 text-xs font-bold">1</span>
                生徒情報の入力
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">生徒氏名</label>
                    <input type="text" id="student-name" placeholder="例：山田 花子" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">メールアドレス</label>
                    <input type="email" id="parent-email" placeholder="確認メールの送信先" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>
        </section>

        <!-- STEP 2 -->
        <section class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-slate-100">
            <h2 class="text-lg font-semibold mb-4 flex items-center text-slate-700">
                <span class="w-7 h-7 bg-blue-600 text-white rounded-full flex items-center justify-center mr-2 text-xs font-bold">2</span>
                希望日時の選択
            </h2>
            <div class="mb-4">
                <div class="flex gap-2 overflow-x-auto pb-3 no-scrollbar" id="day-selector"></div>
            </div>
            <div class="grid grid-cols-2 gap-3" id="time-slots"></div>
        </section>

        <div class="sticky bottom-6 px-2">
            <button id="btn-submit" disabled class="w-full py-4 bg-slate-300 text-white font-bold rounded-2xl shadow-lg active:scale-95 disabled:cursor-not-allowed transition-all">
                <span id="btn-text">予約を確定する</span>
            </button>
            <p class="text-[10px] text-center text-slate-400 mt-2">※一枠一人限定のため、確定後の変更は担任まで。</p>
        </div>
    </div>

    <!-- 管理ビュー -->
    <div id="view-admin" class="hidden text-center py-10">
        <h1 class="text-2xl font-bold mb-4 text-slate-800">管理モード</h1>
        <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
            <p class="text-slate-600 mb-6 leading-relaxed text-sm">予約状況はスプレッドシートにて<br>リアルタイムでご確認いただけます。</p>
            <button onclick="window.open('https://docs.google.com/spreadsheets/', '_blank')" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-slate-700 transition-colors">
                シートを開く
            </button>
        </div>
        <button id="btn-back-user" class="mt-8 text-sm text-blue-600 font-bold underline">予約画面に戻る</button>
    </div>

    <!-- 完了通知モーダル -->
    <div id="modal-success" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full text-center shadow-2xl scale-in">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl font-bold">✓</div>
            <h3 class="text-2xl font-bold text-slate-800 mb-2">予約完了</h3>
            <p id="confirm-details" class="text-slate-600 mb-6 font-medium bg-slate-50 p-4 rounded-2xl whitespace-pre-wrap"></p>
            <button onclick="location.reload()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 shadow-lg">閉じる</button>
        </div>
    </div>
</div>

<script>
    // 【重要】GASでデプロイした最新の「ウェブアプリURL」を入力してください
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx5sNEb6L2DNMd7uI3n3N4fCgMoZ9UKAaQgbc7FDa1ObU9C65bsA1upGAzE07T1z9Hl/exec"; 

    const START_DATE = new Date(2026, 3, 22);
    const END_DATE = new Date(2026, 4, 15);
    const EXCLUDED_DATES = ['4/28', '4/29', '5/3', '5/4', '5/5', '5/6', '5/7', '5/8'];
    
    let scheduleData = [];
    let selectedDayIndex = 0;
    let selectedSlotId = null;
    let isSubmitting = false;

    /**
     * JSONPを使用してCORSを回避するコア関数
     */
    function fetchReservationsJSONP() {
        return new Promise((resolve, reject) => {
            // URLバリデーション
            if (!GAS_WEB_APP_URL || !GAS_WEB_APP_URL.startsWith("https://script.google.com")) {
                reject("URLが設定されていないか、形式が正しくありません。");
                return;
            }

            const callbackName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
            const script = document.createElement('script');
            
            // タイムアウト監視（12秒）
            const timeoutId = setTimeout(() => {
                cleanup();
                reject("通信タイムアウトが発生しました。");
            }, 12000);

            const cleanup = () => {
                delete window[callbackName];
                if (script.parentNode) script.parentNode.removeChild(script);
                clearTimeout(timeoutId);
            };

            window[callbackName] = (data) => {
                cleanup();
                resolve(data);
            };

            // パラメータ構築（既存のクエリがある場合に対応）
            const urlWithParams = new URL(GAS_WEB_APP_URL);
            urlWithParams.searchParams.set('callback', callbackName);
            urlWithParams.searchParams.set('_t', Date.now()); // キャッシュ破棄

            script.src = urlWithParams.toString();
            script.async = true;
            script.onerror = () => {
                cleanup();
                reject("スクリプト読み込みエラー。URLが正しいか確認してください。");
            };

            document.head.appendChild(script);
        });
    }

    async function init() {
        try {
            const bookedList = await fetchReservationsJSONP();
            scheduleData = generateSchedule(bookedList);
            renderDays();
            renderSlots();
            setupEventListeners();
            hideOverlay();
        } catch (e) {
            console.error("Init Error:", e);
            showErrorUI();
        }
    }

    function hideOverlay() {
        const overlay = document.getElementById('loading-overlay');
        if (overlay) overlay.style.display = 'none';
    }

    function showErrorUI() {
        document.getElementById('loading-content').classList.add('hidden');
        document.getElementById('error-content').classList.remove('hidden');
    }

    function generateSchedule(bookedList) {
        const schedule = [];
        const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
        let slotIdCounter = 1;
        let currentDate = new Date(START_DATE);

        while (currentDate <= END_DATE) {
            const month = currentDate.getMonth() + 1;
            const date = currentDate.getDate();
            const dayNum = currentDate.getDay();
            const dateStr = `${month}/${date}`;
            const fullDateLabel = `${month}/${date}(${dayNames[dayNum]})`;

            if (dayNum !== 0 && !EXCLUDED_DATES.includes(dateStr)) {
                let times = (dayNum === 6) ? ['11:50', '12:05'] : ['12:45', '13:00', '15:30'];
                
                schedule.push({
                    date: fullDateLabel,
                    slots: times.map(time => {
                        // 予約済み判定
                        const isBooked = Array.isArray(bookedList) && bookedList.some(b => 
                            String(b.date).includes(fullDateLabel) && String(b.time) === time
                        );
                        return { id: slotIdCounter++, time: time, booked: isBooked };
                    })
                });
            }
            currentDate.setDate(currentDate.getDate() + 1);
        }
        return schedule;
    }

    const daySelector = document.getElementById('day-selector');
    const timeSlotContainer = document.getElementById('time-slots');
    const btnSubmit = document.getElementById('btn-submit');
    const studentInput = document.getElementById('student-name');
    const emailInput = document.getElementById('parent-email');

    function renderDays() {
        daySelector.innerHTML = scheduleData.map((day, index) => {
            const allBooked = day.slots.every(s => s.booked);
            return `
                <button onclick="selectDay(${index})" class="px-5 py-2.5 rounded-2xl whitespace-nowrap text-sm font-bold transition-all ${selectedDayIndex === index ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-500 border border-slate-200'}">
                    ${day.date} ${allBooked ? ' <span class="text-[10px] opacity-70">満</span>' : ''}
                </button>
            `;
        }).join('');
    }

    function renderSlots() {
        if (!scheduleData[selectedDayIndex]) return;
        const slots = scheduleData[selectedDayIndex].slots;
        
        timeSlotContainer.innerHTML = slots.map(slot => {
            const statusClass = slot.booked ? 'slot-booked' : (selectedSlotId === slot.id ? 'slot-selected' : 'slot-available');
            const statusText = slot.booked ? '予約済み' : '予約可能';
            
            return `
                <div onclick="${slot.booked || isSubmitting ? '' : `selectSlot(${slot.id})`}" 
                     class="p-5 rounded-2xl text-center font-bold border-2 transition-all ${statusClass}">
                    <span class="text-lg">${slot.time}</span>
                    <div class="text-[10px] font-bold mt-1 opacity-80">${statusText}</div>
                </div>
            `;
        }).join('');
        validate();
    }

    window.selectDay = (index) => {
        if (isSubmitting) return;
        selectedDayIndex = index;
        selectedSlotId = null;
        renderDays();
        renderSlots();
    };

    window.selectSlot = (id) => {
        if (isSubmitting) return;
        selectedSlotId = id;
        renderSlots();
    };

    function validate() {
        const isValid = studentInput.value.trim() !== '' && 
                        emailInput.value.includes('@') && 
                        selectedSlotId !== null && 
                        !isSubmitting;
        
        btnSubmit.disabled = !isValid;
        if (isValid) {
            btnSubmit.classList.replace('bg-slate-300', 'bg-blue-600');
        } else {
            btnSubmit.classList.replace('bg-blue-600', 'bg-slate-300');
        }
    }

    function setupEventListeners() {
        [studentInput, emailInput].forEach(el => el.addEventListener('input', validate));
        
        const toggleView = () => {
            document.getElementById('view-user').classList.toggle('hidden');
            document.getElementById('view-admin').classList.toggle('hidden');
        };
        document.getElementById('btn-toggle-view').addEventListener('click', toggleView);
        document.getElementById('btn-back-user').addEventListener('click', toggleView);

        btnSubmit.addEventListener('click', async () => {
            if (isSubmitting) return;
            
            const day = scheduleData[selectedDayIndex];
            const slot = day.slots.find(s => s.id === selectedSlotId);
            if (!slot || slot.booked) return;

            isSubmitting = true;
            document.getElementById('btn-text').innerHTML = '<span class="loading-spinner h-4 w-4 mr-2 border-white/30 border-t-white"></span>登録中...';
            validate();

            try {
                await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        action: 'add',
                        studentName: studentInput.value,
                        email: emailInput.value,
                        dateLabel: day.date,
                        time: slot.time
                    })
                });

                document.getElementById('confirm-details').innerText = `${studentInput.value} 様\n\n日時：${day.date} ${slot.time}〜`;
                document.getElementById('modal-success').classList.remove('hidden');

            } catch (err) {
                console.error("Submit Error:", err);
                alert("送信に失敗しました。再読み込みして空き状況を確認してください。");
                location.reload();
            }
        });
    }

    init();
</script>

</body>
</html>
