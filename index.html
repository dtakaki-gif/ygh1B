<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面談予約システム - 高校二者面談</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .slot-booked { background-color: #fee2e2; color: #991b1b; cursor: not-allowed; opacity: 0.6; }
        .slot-available { background-color: #f0fdf4; color: #166534; cursor: pointer; transition: all 0.2s; }
        .slot-available:hover { background-color: #dcfce7; transform: translateY(-1px); }
        .slot-selected { background-color: #16a34a !important; color: white !important; ring: 2px solid #15803d; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

<div id="app" class="max-w-md mx-auto p-4 sm:p-6 pb-24">
    <!-- View Switcher -->
    <div class="flex justify-end mb-4">
        <button id="btn-toggle-view" class="text-[10px] bg-slate-200 text-slate-600 px-3 py-1 rounded-full hover:bg-slate-300 transition-colors shadow-sm">
            管理者モードへ切替
        </button>
    </div>

    <!-- User View (Reservation) -->
    <div id="view-user">
        <header class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-slate-800">春期 二者面談予約</h1>
            <p class="text-sm text-slate-500 mt-2">期間：4/22(水) 〜 5/15(金)</p>
        </header>

        <section class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-slate-100">
            <h2 class="text-lg font-semibold mb-4 flex items-center text-slate-700">
                <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mr-2 text-sm font-bold">1</span>
                生徒情報の入力
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">生徒氏名</label>
                    <input type="text" id="student-name" placeholder="例：山田 花子" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">メールアドレス</label>
                    <input type="email" id="parent-email" placeholder="確認メール送信先" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-slate-100">
            <h2 class="text-lg font-semibold mb-4 flex items-center text-slate-700">
                <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mr-2 text-sm font-bold">2</span>
                日時の選択
            </h2>
            <div class="mb-4">
                <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar" id="day-selector"></div>
            </div>
            <div class="grid grid-cols-2 gap-3" id="time-slots"></div>
        </section>

        <div class="sticky bottom-6 px-2">
            <button id="btn-submit" disabled class="w-full py-4 bg-slate-300 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95 disabled:cursor-not-allowed">
                <span id="btn-text">予約を確定する</span>
            </button>
        </div>
    </div>

    <!-- Admin View -->
    <div id="view-admin" class="hidden">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-slate-800">予約管理ページ</h1>
            <p class="text-sm text-slate-500 mt-2">現在の予約状況を確認できます（デモ用）</p>
        </header>
        <section class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100">
            <div class="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center text-xs text-slate-400 font-medium italic">
                ※実運用ではスプレッドシートをご確認ください
            </div>
            <div id="admin-list" class="divide-y divide-slate-100"></div>
        </section>
    </div>

    <!-- Success Modal -->
    <div id="modal-success" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
            </div>
            <h3 class="text-xl font-bold mb-2">予約が確定しました</h3>
            <p id="confirm-details" class="text-sm text-slate-600 mb-4 whitespace-pre-wrap font-medium"></p>
            <p class="text-[11px] text-blue-600 mb-6 bg-blue-50 p-3 rounded-lg">ご入力いただいたメールアドレス宛に<br>確認メールを送信しました。</p>
            <button onclick="location.reload()" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold">完了して閉じる</button>
        </div>
    </div>
</div>

<script>
    // 【重要】ここにデプロイしたGASのウェブアプリURLを貼り付けてください
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz5voyD0QRkPsgcSDJ4jvu4rqQwxFMpSLduC5td8_blbz6BRhYlGSnV6epUZq3nrVHx/exec";

    const START_DATE = new Date(2026, 3, 22);
    const END_DATE = new Date(2026, 4, 15);
    const EXCLUDED_DATES = ['4/28', '4/29', '5/3', '5/4', '5/5', '5/6', '5/7', '5/8'];
    
    let scheduleData = [];
    let reservations = []; 
    let selectedDayIndex = 0;
    let selectedSlotId = null;
    let isAdminView = false;
    let isSubmitting = false;

    function generateSchedule() {
        const schedule = [];
        const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
        let slotIdCounter = 1;
        let currentDate = new Date(START_DATE);

        while (currentDate <= END_DATE) {
            const month = currentDate.getMonth() + 1;
            const date = currentDate.getDate();
            const dayNum = currentDate.getDay();
            const dateStr = `${month}/${date}`;
            const fullDateLabel = `${month}/${date}(${dayNames[dayNum]})`;

            if (dayNum !== 0 && !EXCLUDED_DATES.includes(dateStr)) {
                let times = (dayNum === 6) ? ['11:50', '12:05'] : ['12:45', '13:00', '15:30'];
                schedule.push({
                    date: fullDateLabel,
                    slots: times.map(time => ({
                        id: slotIdCounter++,
                        time: time,
                        booked: false
                    }))
                });
            }
            currentDate.setDate(currentDate.getDate() + 1);
        }
        return schedule;
    }

    const daySelector = document.getElementById('day-selector');
    const timeSlotContainer = document.getElementById('time-slots');
    const btnSubmit = document.getElementById('btn-submit');
    const btnText = document.getElementById('btn-text');
    const studentInput = document.getElementById('student-name');
    const emailInput = document.getElementById('parent-email');
    const adminList = document.getElementById('admin-list');
    const viewUser = document.getElementById('view-user');
    const viewAdmin = document.getElementById('view-admin');
    const btnToggleView = document.getElementById('btn-toggle-view');

    function init() {
        scheduleData = generateSchedule();
        renderDays();
        renderSlots();
        setupEventListeners();
    }

    function renderDays() {
        daySelector.innerHTML = scheduleData.map((day, index) => `
            <button type="button" onclick="selectDay(${index})" class="px-4 py-2 rounded-xl whitespace-nowrap text-sm font-medium transition-all ${selectedDayIndex === index ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200'}">
                ${day.date}
            </button>
        `).join('');
    }

    function renderSlots() {
        const slots = scheduleData[selectedDayIndex].slots;
        timeSlotContainer.innerHTML = slots.map(slot => `
            <div onclick="${slot.booked || isSubmitting ? '' : `selectSlot(${slot.id})`}" 
                 class="p-4 rounded-xl text-center font-bold border-2 transition-all ${slot.booked ? 'slot-booked' : (selectedSlotId === slot.id ? 'slot-selected' : 'slot-available')}">
                ${slot.time}
                <div class="text-[10px] font-normal mt-1">${slot.booked ? '予約済み' : '予約可能'}</div>
            </div>
        `).join('');
        validate();
    }

    window.selectDay = (index) => {
        if (isSubmitting) return;
        selectedDayIndex = index;
        selectedSlotId = null;
        renderDays();
        renderSlots();
    };

    window.selectSlot = (id) => {
        if (isSubmitting) return;
        selectedSlotId = id;
        renderSlots();
    };

    function validate() {
        const isValid = studentInput.value.trim() !== '' && emailInput.value.includes('@') && selectedSlotId !== null && !isSubmitting;
        btnSubmit.disabled = !isValid;
        btnSubmit.className = isValid ? "w-full py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95" : "w-full py-4 bg-slate-300 text-white font-bold rounded-xl shadow-lg transition-all cursor-not-allowed opacity-70";
    }

    function setupEventListeners() {
        [studentInput, emailInput].forEach(el => el.addEventListener('input', validate));
        
        btnToggleView.addEventListener('click', () => {
            isAdminView = !isAdminView;
            viewUser.classList.toggle('hidden', isAdminView);
            viewAdmin.classList.toggle('hidden', !isAdminView);
            btnToggleView.innerText = isAdminView ? "予約画面へ戻る" : "管理者モードへ切替";
        });

        btnSubmit.addEventListener('click', async () => {
            if (isSubmitting) return;
            
            const day = scheduleData[selectedDayIndex];
            const slot = day.slots.find(s => s.id === selectedSlotId);
            if (!slot) return;

            isSubmitting = true;
            btnText.innerHTML = '<span class="loading-spinner"></span>送信中...';
            validate();

            const payload = {
                action: 'add',
                studentName: studentInput.value,
                email: emailInput.value,
                dateLabel: day.date,
                time: slot.time
            };

            try {
                // GASへの送信
                if (GAS_WEB_APP_URL !== "YOUR_GAS_WEB_APP_URL_HERE") {
                    await fetch(GAS_WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors', // GASへのPOSTはno-corsが一般的
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } else {
                    console.warn("GAS URLが設定されていないため、モック動作のみ実行します。");
                }

                document.getElementById('confirm-details').innerText = `${payload.studentName} 様\n\n日時：${payload.dateLabel} ${payload.time}〜`;
                document.getElementById('modal-success').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                alert("送信に失敗しました。時間をおいて再度お試しください。");
            } finally {
                isSubmitting = false;
                btnText.innerText = "予約を確定する";
                validate();
            }
        });
    }

    init();
</script>

</body>
</html>
